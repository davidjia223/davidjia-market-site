name: EOD market data update

on:
  schedule:
    # Initial attempt plus two later retries, all in Toronto local time.
    # A retry becomes a no-op once the current market date is already committed.
    - cron: "45 17 * * 1-5"
      timezone: "America/Toronto"
    - cron: "30 20 * * 1-5"
      timezone: "America/Toronto"
    - cron: "30 22 * * 1-5"
      timezone: "America/Toronto"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch end-of-day market data
        id: market
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python fetch_market_data.py
          if git diff --quiet -- site/data/market.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data back to the repo
        if: steps.market.outputs.changed == 'true'
        run: |
          git config user.name "eod-market-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/market.json
          git diff --cached --quiet || git commit -m "EOD market data $(date -u +%F)"
          git push

      # ---------------------------------------------------------------
      # OPTIONAL DEPLOY TO AWS — pick ONE mode by setting the repository
      # variable DEPLOY_MODE (Settings → Secrets and variables → Actions
      # → Variables) to "s3" or "ssh". Leave it unset to skip deployment
      # entirely: the site can read market.json straight from GitHub raw,
      # so data still updates automatically with no AWS credentials here.
      # ---------------------------------------------------------------

      # MODE 1 — simulator hosted under /projects/protective-put/ on S3
      # (+ optional CloudFront). The fixed prefix keeps --delete away from
      # the personal site's root files.
      # Authentication uses GitHub OIDC and a least-privilege AWS role.
      # Variables needed: DEPLOY_MODE=s3, AWS_REGION, S3_BUCKET,
      #                   CLOUDFRONT_ID (optional)
      - name: Configure AWS credentials
        if: steps.market.outputs.changed == 'true' && vars.DEPLOY_MODE == 's3'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::555545761964:role/GitHubActionsDeployDavidJiaMarketSite
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync simulator project to S3
        if: steps.market.outputs.changed == 'true' && vars.DEPLOY_MODE == 's3'
        run: |
          PROJECT_PREFIX="projects/protective-put"
          aws s3 sync site/ "s3://${{ vars.S3_BUCKET }}/${PROJECT_PREFIX}/" \
            --delete --exclude "index.html" --exclude "data/market.json" --only-show-errors
          aws s3 cp site/index.html "s3://${{ vars.S3_BUCKET }}/${PROJECT_PREFIX}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --only-show-errors
          aws s3 cp site/data/market.json "s3://${{ vars.S3_BUCKET }}/${PROJECT_PREFIX}/data/market.json" \
            --content-type "application/json" \
            --cache-control "no-store, max-age=0" \
            --only-show-errors

      - name: Invalidate CloudFront cache
        if: steps.market.outputs.changed == 'true' && vars.DEPLOY_MODE == 's3' && vars.CLOUDFRONT_ID != ''
        run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ vars.CLOUDFRONT_ID }}
          --paths "/projects/protective-put" "/projects/protective-put/*"

      # MODE 2 — site hosted on an EC2 / Lightsail box (nginx, apache…)
      # Secrets needed: DEPLOY_MODE=ssh (variable), SSH_HOST, SSH_USER,
      #                 SSH_PRIVATE_KEY (a deploy key added to the server)
      # Variable (optional): DEPLOY_PATH — defaults to the project subdirectory
      - name: Deploy via rsync over SSH
        if: steps.market.outputs.changed == 'true' && vars.DEPLOY_MODE == 'ssh'
        run: |
          DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/var/www/davidjia.ca/projects/protective-put' }}"
          case "$DEPLOY_PATH" in
            */projects/protective-put) ;;
            *) echo "DEPLOY_PATH must end in /projects/protective-put" >&2; exit 1 ;;
          esac
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          rsync -avz --delete -e "ssh -i ~/.ssh/id_deploy" \
            site/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${DEPLOY_PATH}/"
