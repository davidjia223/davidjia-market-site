<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const {
  ComposedChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
  ReferenceLine, ResponsiveContainer, Legend,
} = Recharts;

/* ============================================================
   DATA LAYER
   Priority: freshest of  (a) ./data/market.json on this server
                          (b) GitHub raw copy updated nightly by Actions
   Fallback: bundled snapshot below (clearly labeled in the header).
   To enable (b), replace the placeholders with your repo path.
   ============================================================ */
const GITHUB_RAW_DATA_URL =
  "https://raw.githubusercontent.com/davidjia223/davidjia-market-site/main/site/data/market.json";

const FALLBACK = {
  asOf: "2026-07-14",
  spy: { price: 751.83, history: null, source: "bundled" },
  vix: { spot: 16.5, v9d: null, v3m: null, v6m: null },
  rates: { tbill3m: 4.2, t10y: 4.59 },
  divYield: 1.0,
};

const CAPITAL = 10000;
let SPOT, VIX, RATE, DIV, AS_OF, HISTORY, TERM = null, DATA_NOTE = "";

/* ---------- Black-Scholes machinery ---------- */
function normCdf(x) {
  const t = 1 / (1 + 0.2316419 * Math.abs(x));
  const d = 0.3989423 * Math.exp((-x * x) / 2);
  const p =
    d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  return x > 0 ? 1 - p : p;
}

function putPrice(S, K, T, sigma, r = RATE, q = DIV) {
  if (T <= 0) return Math.max(K - S, 0);
  const sq = sigma * Math.sqrt(T);
  const d1 = (Math.log(S / K) + (r - q + (sigma * sigma) / 2) * T) / sq;
  const d2 = d1 - sq;
  return K * Math.exp(-r * T) * normCdf(-d2) - S * Math.exp(-q * T) * normCdf(-d1);
}

/* Base ATM vol for maturity T: real CBOE term structure (VIX9D/VIX/VIX3M/VIX6M)
   interpolated when available; otherwise VIX + mild contango model. */
function termBase(Tyears) {
  if (!TERM || TERM.length < 2) return VIX + 0.015 * Math.sqrt(Tyears);
  if (Tyears <= TERM[0][0]) return TERM[0][1];
  for (let i = 1; i < TERM.length; i++) {
    if (Tyears <= TERM[i][0]) {
      const [t0, v0] = TERM[i - 1];
      const [t1, v1] = TERM[i];
      return v0 + ((v1 - v0) * (Tyears - t0)) / (t1 - t0);
    }
  }
  const [tL, vL] = TERM[TERM.length - 1];
  return vL + 0.01 * (Math.sqrt(Tyears) - Math.sqrt(tL));
}

/* Implied vol: term-structure base + OTM put skew (steepest short-dated). */
function impliedVol(Tyears, otmPct, baseVol) {
  const base =
    baseVol !== undefined ? baseVol + 0.015 * Math.sqrt(Tyears) : termBase(Tyears);
  const months = Math.max(Tyears * 12, 0.25);
  const skew = otmPct * (0.75 / Math.sqrt(months));
  return Math.min(base + skew, 0.9);
}

function crashVol(Tyears, dropPct) {
  return Math.min(impliedVol(Tyears, 0) + dropPct * 1.3, 0.6);
}

/* ---------- fallback pseudo-history (only if live data fails) ---------- */
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function buildHistory(days) {
  const rnd = mulberry32(20260714);
  const raw = [1];
  for (let i = 1; i < days; i++) {
    const shock = (rnd() + rnd() + rnd() - 1.5) * 2;
    const dip = i > days * 0.35 && i < days * 0.42 ? -0.0035 : 0;
    raw.push(raw[i - 1] * (1 + 0.00045 + dip + shock * 0.0085));
  }
  const scale = SPOT / raw[raw.length - 1];
  return raw.map((v) => v * scale);
}

function applyData(d, srcLabel) {
  SPOT = d.spy.price;
  VIX = (d.vix && d.vix.spot ? d.vix.spot : 16.5) / 100;
  RATE = (d.rates && d.rates.tbill3m != null ? d.rates.tbill3m : 4.2) / 100;
  DIV = (d.divYield != null ? d.divYield : 1.0) / 100;
  AS_OF = d.asOf || "unknown";
  HISTORY =
    d.spy.history && d.spy.history.length > 30
      ? d.spy.history.slice(-252).map((row) => row[1])
      : buildHistory(252);
  const pts = [];
  if (d.vix) {
    if (d.vix.v9d) pts.push([9 / 365, d.vix.v9d / 100]);
    if (d.vix.spot) pts.push([30 / 365, d.vix.spot / 100]);
    if (d.vix.v3m) pts.push([91 / 365, d.vix.v3m / 100]);
    if (d.vix.v6m) pts.push([182 / 365, d.vix.v6m / 100]);
  }
  TERM = pts.length >= 2 ? pts : null;
  DATA_NOTE = srcLabel + (TERM ? " · real vol term structure" : " · modeled term structure");
}

/* ============================================================
   CRASH TIME MACHINE — five real S&P 500 episodes.
   Stylized reconstructions from public index data:
   [months since entry, price / entry price, VIX-level anchor].
   1987 predates the VIX; vol there is a VXO-style estimate.
   ============================================================ */
const EPISODES = [
  {
    id: "1987", name: "Black Monday '87", dates: "Aug 1987 → Aug 1988", tag: "FLASH CRASH",
    lesson: "−20.5% in a single session (Oct 19), −33% peak to trough in ~3 months. Anyone holding puts through that day was paid at extreme multiples — implied vol went vertical.",
    path: [[0, 1.000, 18], [1.2, 0.955, 20], [1.6, 0.933, 23], [1.75, 0.836, 35], [1.85, 0.671, 90],
           [2.1, 0.673, 55], [3.3, 0.665, 40], [4.5, 0.700, 33], [6, 0.735, 28], [9, 0.755, 26], [12, 0.780, 24]],
  },
  {
    id: "2000", name: "Dot-Com Unwind", dates: "Mar 2000 → Oct 2002", tag: "SLOW BLEED",
    lesson: "−49% over 2.5 years with no single dramatic day — the closest historical rhyme to a deflating AI bubble. Strikes ratchet down as you roll, so each leg often expires just above its strike while the market keeps sinking.",
    path: [[0, 1.000, 24], [3, 0.951, 22], [6, 0.940, 21], [9, 0.864, 26], [12, 0.760, 32], [15, 0.801, 22],
           [18, 0.681, 43], [21, 0.751, 24], [24, 0.750, 20], [27, 0.648, 29], [30, 0.535, 40], [31, 0.509, 36]],
  },
  {
    id: "2008", name: "2008 Financial Crisis", dates: "Oct 2007 → Oct 2009", tag: "CASCADING CRISIS",
    lesson: "A year-long grind that turned into a cascade after Lehman (Sep 2008), bottoming −57% below the peak. Rolling protection got brutally expensive exactly when it mattered — VIX touched 80.",
    path: [[0, 1.000, 17], [2.7, 0.938, 22], [5.7, 0.845, 26], [8.7, 0.818, 24], [10.7, 0.822, 21],
           [11.7, 0.746, 39], [12.7, 0.618, 60], [13.7, 0.573, 55], [14.7, 0.577, 40], [16.6, 0.469, 46],
           [17, 0.432, 49], [20, 0.587, 28], [24, 0.662, 25]],
  },
  {
    id: "2020", name: "COVID Crash", dates: "Feb → Aug 2020", tag: "FLASH CRASH",
    lesson: "−34% in 23 trading days, then a V-shaped recovery to new highs within six months. The dream case for put insurance: cheap entry (VIX ~14), instant payoff, fast reset.",
    path: [[0, 1.000, 14], [0.3, 0.873, 40], [0.55, 0.878, 42], [0.8, 0.799, 58], [1.0, 0.681, 66],
           [1.1, 0.661, 62], [1.25, 0.755, 65], [2.0, 0.851, 38], [3.3, 0.899, 28], [4.4, 0.916, 30], [6, 1.001, 22]],
  },
  {
    id: "2022", name: "2022 Rate Shock", dates: "Jan → Dec 2022", tag: "ORDERLY GRIND",
    lesson: "−25% over nine months with VIX never sustaining above ~35. The hedge that disappointed: an orderly stairstep decline rarely pierces the deductible deeply before each expiry, so premiums bleed while payouts stay thin.",
    path: [[0, 1.000, 17], [0.9, 0.941, 24.8], [1.85, 0.912, 30.2], [2.9, 0.944, 20.6], [3.85, 0.861, 33.4],
           [4.9, 0.862, 26.2], [5.9, 0.789, 28.7], [6.85, 0.861, 21.3], [7.9, 0.824, 25.9], [8.9, 0.747, 31.6],
           [9.3, 0.746, 33.6], [10.9, 0.851, 20.6], [11.9, 0.801, 21.7]],
  },
];

function lerpPath(path, m) {
  if (m <= path[0][0]) return { px: path[0][1], vix: path[0][2] };
  for (let i = 1; i < path.length; i++) {
    if (m <= path[i][0]) {
      const [m0, p0, v0] = path[i - 1];
      const [m1, p1, v1] = path[i];
      const f = (m - m0) / (m1 - m0);
      return { px: p0 + (p1 - p0) * f, vix: v0 + (v1 - v0) * f };
    }
  }
  const last = path[path.length - 1];
  return { px: last[1], vix: last[2] };
}

function runBacktest(episode, horizonMonths, prot) {
  const path = episode.path;
  const endM = path[path.length - 1][0];
  const shares = CAPITAL;
  const T = horizonMonths / 12;
  let cumPrem = 0, cumPay = 0, legs = 0;
  let legStart = 0, legK = -1;

  const openLeg = (m) => {
    const { px, vix } = lerpPath(path, m);
    legK = px * (1 - prot);
    cumPrem += shares * putPrice(px, legK, T, impliedVol(T, prot, vix / 100));
    legStart = m; legs++;
  };
  openLeg(0);

  const rows = [];
  let minH = Infinity, minU = Infinity;
  const step = endM / 96;
  for (let m = 0; m <= endM + 1e-9; m += step) {
    while (legK > 0 && m - legStart >= horizonMonths - 1e-9) {
      const expM = legStart + horizonMonths;
      const { px } = lerpPath(path, expM);
      cumPay += shares * Math.max(legK - px, 0);
      if (expM < endM - 0.01) openLeg(expM);
      else { legK = -1; legStart = expM; }
    }
    const { px, vix } = lerpPath(path, m);
    let putVal = 0;
    if (legK > 0) {
      const tLeft = Math.max((legStart + horizonMonths - m) / 12, 0);
      const otmNow = Math.max((px - legK) / px, 0);
      putVal = shares * (tLeft <= 1e-4
        ? Math.max(legK - px, 0)
        : putPrice(px, legK, tLeft, impliedVol(tLeft, otmNow, vix / 100)));
    }
    const unhedged = shares * px;
    const hedged = unhedged + putVal + cumPay - cumPrem;
    minH = Math.min(minH, hedged);
    minU = Math.min(minU, unhedged);
    rows.push({ month: +m.toFixed(2), unhedged: Math.round(unhedged), hedged: Math.round(hedged) });
  }

  let openMark = 0;
  if (legK > 0) {
    const { px, vix } = lerpPath(path, endM);
    const tLeft = Math.max((legStart + horizonMonths - endM) / 12, 0);
    const otmNow = Math.max((px - legK) / px, 0);
    openMark = shares * (tLeft <= 1e-4
      ? Math.max(legK - px, 0)
      : putPrice(px, legK, tLeft, impliedVol(tLeft, otmNow, vix / 100)));
  }

  const last = rows[rows.length - 1];
  return {
    rows, legs, cumPrem, received: cumPay + openMark, endM,
    finalH: last.hedged, finalU: last.unhedged,
    ddH: (CAPITAL - minH) / CAPITAL, ddU: (CAPITAL - minU) / CAPITAL,
  };
}

/* ---------- config choices ---------- */
const HORIZONS = [
  { label: "1 month", months: 1 },
  { label: "6 months", months: 6 },
  { label: "1 year", months: 12 },
  { label: "2 years", months: 24 },
];
const PROTECTIONS = [0.05, 0.1, 0.15, 0.2];

const fmt$ = (v) =>
  v.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
const fmt$2 = (v) =>
  v.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 });
const fmtPct = (v, d = 1) => `${(v * 100).toFixed(d)}%`;

/* ============================================================ */
function App() {
  const [horizonIdx, setHorizonIdx] = useState(2);
  const [protIdx, setProtIdx] = useState(1);
  const [crashSize, setCrashSize] = useState(0.2);
  const [crashMonth, setCrashMonth] = useState(3);
  const [driftMonth, setDriftMonth] = useState(6);
  const [showNotes, setShowNotes] = useState(false);
  const [episodeIdx, setEpisodeIdx] = useState(1);

  const horizon = HORIZONS[horizonIdx];
  const T = horizon.months / 12;
  const prot = PROTECTIONS[protIdx];
  const strike = SPOT * (1 - prot);
  const shares = CAPITAL / SPOT;

  const model = useMemo(() => {
    const sigma = impliedVol(T, prot);
    const premiumPerShare = putPrice(SPOT, strike, T, sigma);
    const premium = premiumPerShare * shares;
    const premiumPct = premium / CAPITAL;
    const annualDrag = premiumPct / T;
    const floorValue = shares * strike - premium;
    const maxLoss = CAPITAL - floorValue;
    const breakeven = premiumPct / (1 - DIV * T);
    const thetaDay =
      (putPrice(SPOT, strike, Math.max(T - 1 / 365, 1e-6), sigma) - premiumPerShare) * shares;

    const payoff = [];
    for (let m = -0.4; m <= 0.301; m += 0.01) {
      const endPx = SPOT * (1 + m);
      const unhedged = shares * endPx;
      const hedged = shares * endPx + shares * Math.max(strike - endPx, 0) - premium;
      payoff.push({
        move: Math.round(m * 100),
        unhedged: Math.round(unhedged),
        hedged: Math.round(hedged),
      });
    }

    const maxM = horizon.months;
    const timing = [];
    for (let mth = 0; mth <= maxM; mth += maxM / 24) {
      const tLeft = Math.max(T - mth / 12, 0);
      const crashedPx = SPOT * (1 - crashSize);
      const putVal =
        tLeft <= 0.001
          ? Math.max(strike - crashedPx, 0)
          : putPrice(crashedPx, strike, tLeft, crashVol(tLeft, crashSize));
      const hedged = shares * crashedPx + shares * putVal - premium;
      timing.push({
        month: +mth.toFixed(2),
        hedged: Math.round(hedged),
        unhedged: Math.round(shares * crashedPx),
      });
    }

    const decay = [];
    const dSteps = 48;
    for (let i = 0; i <= dSteps; i++) {
      const mth = (maxM * i) / dSteps;
      const tLeft = Math.max(T - mth / 12, 0);
      const flatVal =
        tLeft <= 0.001
          ? Math.max(strike - SPOT, 0)
          : putPrice(SPOT, strike, tLeft, impliedVol(tLeft, prot));
      const progress = driftMonth > 0 ? Math.min(mth / driftMonth, 1) : 1;
      const px = SPOT + (strike - SPOT) * progress;
      const ddown = (SPOT - px) / SPOT;
      const otmNow = Math.max((px - strike) / SPOT, 0);
      const volNow = Math.min(impliedVol(tLeft, otmNow) + ddown * 1.0, 0.6);
      const driftVal =
        tLeft <= 0.001 ? Math.max(strike - px, 0) : putPrice(px, strike, tLeft, volNow);
      decay.push({
        month: +mth.toFixed(2),
        flat: Math.round(flatVal * shares * 100) / 100,
        drift: Math.round(driftVal * shares * 100) / 100,
      });
    }

    const tLeftTouch = Math.max(T - driftMonth / 12, 0);
    const volTouch = Math.min(impliedVol(tLeftTouch, 0) + prot * 1.0, 0.6);
    const strikeTouchVal =
      (tLeftTouch <= 0.001 ? 0 : putPrice(strike, strike, tLeftTouch, volTouch)) * shares;

    const tLeftSel = Math.max(T - crashMonth / 12, 0);
    const crashedPx = SPOT * (1 - crashSize);
    const putSel =
      tLeftSel <= 0.001
        ? Math.max(strike - crashedPx, 0)
        : putPrice(crashedPx, strike, tLeftSel, crashVol(tLeftSel, crashSize));
    const hedgedSel = shares * crashedPx + shares * putSel - premium;
    const unhedgedSel = shares * crashedPx;

    const histStep = 3;
    const main = [];
    HISTORY.forEach((p, i) => {
      if (i % histStep === 0)
        main.push({ x: i - HISTORY.length, price: Math.round(p * 100) / 100 });
    });
    const fwdDays = Math.round((horizon.months / 12) * 252);
    for (let i = 0; i <= fwdDays; i += Math.max(Math.round(fwdDays / 40), 1)) {
      main.push({ x: i, floor: Math.round(strike * 100) / 100 });
    }

    return {
      sigma, premium, premiumPct, annualDrag, floorValue, maxLoss, breakeven,
      payoff, timing, main, hedgedSel, unhedgedSel, putSel,
      decay, thetaDay, strikeTouchVal,
    };
  }, [T, prot, strike, shares, horizon.months, crashSize, crashMonth, driftMonth]);

  const ep = EPISODES[episodeIdx];
  const bt = useMemo(
    () => runBacktest(ep, horizon.months, prot),
    [ep, horizon.months, prot]
  );
  const verdict =
    bt.finalH > bt.finalU
      ? `With your settings, insurance finished ${fmt$(bt.finalH - bt.finalU)} ahead of going unprotected and cut the worst drawdown from −${fmtPct(bt.ddU)} to −${fmtPct(bt.ddH)}.`
      : `With your settings, insurance finished ${fmt$(bt.finalU - bt.finalH)} behind going unprotected — ${bt.legs} round${bt.legs === 1 ? "" : "s"} of premium outran the payouts, though the worst drawdown was still trimmed from −${fmtPct(bt.ddU)} to −${fmtPct(bt.ddH)}.`;

  const s = styles;

  return (
    <div style={s.page}>
      <div style={s.wrap}>
        <header style={s.header}>
          <div>
            <div style={s.eyebrow}>PORTFOLIO INSURANCE DESK</div>
            <h1 style={s.h1}>Protective Put Simulator</h1>
            <p style={s.sub}>
              $10,000 in the S&amp;P 500 (SPY&nbsp;{fmt$2(SPOT)}) · VIX {(VIX * 100).toFixed(1)} ·
              data as of {AS_OF}
            </p>
            <p style={s.dataNote}>data source: {DATA_NOTE}</p>
            <button onClick={() => setShowNotes(!showNotes)} style={s.notesLink}>
              {showNotes ? "Hide personal notes ↑" : "Personal notes — why I built this →"}
            </button>
          </div>
          <div style={s.spotBox}>
            <div style={s.spotLabel}>YOUR POSITION</div>
            <div style={s.spotVal}>{fmt$(CAPITAL)}</div>
            <div style={s.spotSub}>{shares.toFixed(3)} SPY-equivalent shares</div>
          </div>
        </header>

        {showNotes && (
          <section style={s.notesCard}>
            <div style={s.notesHead}>PERSONAL NOTES — FROM THE BUILDER</div>
            <div style={s.notesText}>
              <p>Hi everyone,</p>
              <p>I hope you're doing well. I wanted to briefly share why I put this project
              together and why I thought it was interesting.</p>
              <p>Working in banking, through everyday client conversations I have noticed that
              most people have their savings sitting in the S&amp;P 500 with nothing underneath
              it. With the current market uncertainties, and the whole AI bubble incentive
              driving valuations at this time, I felt it would be very interesting for people
              to see what insurance coverage on a portfolio actually looks like — what it
              costs, what it protects, and what it pays back if the downturn comes early</p>
              <p>Most people insure their car, their home, and their health, but not the money
              they worked hardest to build. Options get treated like gambling, when the same
              contract can work like a policy with a deductible and a term. I built this so
              anyone could see the trade-off in plain numbers — the cost of being protected vs
              the cost of being wrong — and make a thoughtful, needs-based decision for
              themselves.</p>
              <p>This started as a personal learning project and I hope it helps you look at
              hedging the same way I started to.</p>
              <p>Best,<br />David</p>
            </div>
          </section>
        )}

        <section style={s.controls}>
          <div>
            <div style={s.controlLabel}>COVERAGE PERIOD — put expiry</div>
            <div style={s.btnRow}>
              {HORIZONS.map((h, i) => (
                <button key={h.label}
                  onClick={() => { setHorizonIdx(i); setCrashMonth(Math.min(crashMonth, h.months)); setDriftMonth(Math.min(driftMonth, h.months)); }}
                  style={{ ...s.btn, ...(i === horizonIdx ? s.btnOn : {}) }}>
                  {h.label}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={s.controlLabel}>DEDUCTIBLE — losses you absorb before insurance kicks in</div>
            <div style={s.btnRow}>
              {PROTECTIONS.map((p, i) => (
                <button key={p} onClick={() => setProtIdx(i)}
                  style={{ ...s.btn, ...(i === protIdx ? s.btnOn : {}) }}>
                  first {fmtPct(p, 0)}
                </button>
              ))}
            </div>
            <div style={s.hint}>
              Put strike {fmt$2(strike)} — every dollar of decline beyond −{fmtPct(prot, 0)} is covered.
            </div>
          </div>
        </section>

        <section style={s.statGrid}>
          <Stat label="Insurance cost (premium)" value={fmt$2(model.premium)}
            sub={`${fmtPct(model.premiumPct)} of portfolio · IV ${fmtPct(model.sigma)}`} tone="amber" s={s} />
          <Stat label="Annualized drag" value={fmtPct(model.annualDrag)}
            sub="cost per year if renewed at same price" tone="ink" s={s} />
          <Stat label="Guaranteed floor at expiry" value={fmt$(model.floorValue)}
            sub={`worst case = −${fmtPct(model.maxLoss / CAPITAL)} (deductible + premium)`} tone="teal" s={s} />
          <Stat label="Upside needed to break even" value={`+${fmtPct(model.breakeven)}`}
            sub="market gain that pays for the hedge" tone="ink" s={s} />
        </section>

        <Panel title="MARKET VIEW" sub={`SPY, trailing 12 months + your ${horizon.label} protection window`} s={s}>
          <ResponsiveContainer width="100%" height={260}>

function Stat({ label, value, sub, tone, s }) {
  const colors = { amber: "#B07A1E", teal: "#0E7C66", ink: "#16202E" };
  return (
    <div style={s.stat}>
      <div style={s.statLabel}>{label}</div>
      <div style={{ ...s.statVal, color: colors[tone] }}>{value}</div>
      <div style={s.statSub}>{sub}</div>
    </div>
  );
}

function Panel({ title, sub, children, s }) {
  return (
    <section style={s.panel}>
      <div style={s.panelHead}>
        <span style={s.panelTitle}>{title}</span>
        <span style={s.panelSub}>{sub}</span>
      </div>
      {children}
    </section>
  );
}

/* ---------- bootstrap: load freshest data, then render ---------- */
async function fetchJson(u) {
  try {
    const r = await fetch(u, { cache: "no-store" });
    if (r.ok) {
      const d = await r.json();
      if (d && d.spy && d.spy.price) return d;
    }
  } catch (e) {}
  return null;
}

(async () => {
  const local = await fetchJson("./data/market.json");
  const remote = GITHUB_RAW_DATA_URL.includes("YOUR_GITHUB_USERNAME")
    ? null
    : await fetchJson(GITHUB_RAW_DATA_URL);
  const newer = (a, b) => (!a ? b : !b ? a : ((b.asOf || "") > (a.asOf || "") ? b : a));
  const d = newer(local, remote);
  if (d) applyData(d, d === remote ? "GitHub raw · live EOD" : "server file · live EOD");
  else applyData(FALLBACK, "bundled fallback snapshot — live feed unavailable");
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
